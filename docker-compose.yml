version: '3.8'

services:
  ollama-proxy:
    build: .
    image: jjb000000/ollama-proxy:latest
    ports:
      - "5002:5002"
    networks:
      - default
      - nginx-network
    environment:
      - GOOGLE_API_KEYS=${GOOGLE_API_KEYS}
      - OPENROUTER_API_KEYS=${OPENROUTER_API_KEYS}
      - AKASH_API_KEYS=${AKASH_API_KEYS}
      - COHERE_API_KEYS=${COHERE_API_KEYS}
      - CODESTRAL_API_KEYS=${CODESTRAL_API_KEYS}
      - NVIDIA_NIM_API_KEYS=${NVIDIA_NIM_API_KEYS}
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - ANTIGRAVITY_API_KEYS=${ANTIGRAVITY_API_KEYS}
      - ANTIGRAVITY_PROXY_URL=http://antigravity-proxy:5010/v1
      - CLI_PROXY_API_KEYS=${CLI_PROXY_API_KEYS}
      - CLI_PROXY_API_BASE_URL=${CLI_PROXY_API_BASE_URL:-http://cli-proxy-api:8317/v1}
      - PROXY_API_TOKEN=${PROXY_API_TOKEN}
      - OLLAMA_API_KEYS=${OLLAMA_API_KEYS}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    volumes:
      - ~/.qwen:/root/.qwen:ro
    restart: always
    container_name: ollama-proxy
    depends_on:
      - antigravity-proxy

  antigravity-proxy:
    build: ../antigravity-proxy
    image: jjb000000/antigravity-proxy:latest
    ports:
      - "5010:5010"
    environment:
      - PORT=5010
      - LOG_LEVEL=INFO
    volumes:
      - ~/.config/opencode:/root/.config/opencode
    restart: always
    container_name: antigravity-proxy

networks:
  nginx-network:
    external: true
