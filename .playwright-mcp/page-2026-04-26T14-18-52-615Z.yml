              - separator [ref=e259]
              - strong [ref=e261]: "Q: How much usage quota does the plan provide?"
              - generic [ref=e262]:
                - strong [ref=e263]: "A:"
                - text: Subscribe once, unlock unmatched usage and unbeatable value.
              - list [ref=e264]:
                - listitem [ref=e265]:
                  - strong [ref=e266]: Lite Plan
                  - text: ": Up to ~80 prompts every 5 hours — about 3× the usage quota of the Claude Pro plan."
                - listitem [ref=e267]:
                  - strong [ref=e268]: Pro Plan
                  - text: ": Up to ~400 prompts every 5 hours — about 5× the usage quota of the Lite plan."
                - listitem [ref=e269]:
                  - strong [ref=e270]: Max Plan
                  - text: ": Up to ~1600 prompts every 5 hours — about 4× the usage quota of the Pro plan."
              - generic [ref=e271]: In terms of token consumption, each prompt typically allows 15–20 model calls, giving a total monthly allowance of tens of billions of tokens — all at only ~1% of standard API pricing, making it extremely cost-effective.
              - blockquote [ref=e272]:
                - list [ref=e273]:
                  - listitem [ref=e274]: The numbers above are estimates; actual usage may vary depending on task complexity, codebase size, and whether auto-accept is enabled.
              - separator [ref=e275]
              - strong [ref=e277]: "Q: Apart from the 5-hour usage limit, are there any other restrictions on usage?"
              - generic [ref=e278]:
                - strong [ref=e279]: "A:"
                - text: To manage resources and ensure fair access for all users, we have introduced a weekly usage quota limit. This quota starts counting from the time you place your order, and the quota is refreshed and reset on a 7-day cycle. You can view the progress of your quota consumption in the
                - link "subscription" [ref=e280] [cursor=pointer]:
                  - /url: https://z.ai/manage-apikey/subscription
                - text: .
              - generic [ref=e281]: Users who subscribe and enable auto-renewal before February 12 will enjoy unlimited weekly usage for the duration of their subscription.
              - separator [ref=e282]
              - strong [ref=e284]: "Q: Which tools are supported?"
              - generic [ref=e285]:
                - strong [ref=e286]: "A:"
                - text: The GLM Coding Plan is strictly limited to use within officially
                - link "supported tools and products" [ref=e287] [cursor=pointer]:
                  - /url: https://docs.z.ai/devpack/tool/others#step-1-supported-tools
                - text: . The subscriber shall not use the subscription benefits in any unsupported tools or scenarios.
                - text: Please refer to our tool guide for step-by-step setup. All supported coding tools share the same usage quota under your subscription.
              - separator [ref=e288]
              - strong [ref=e290]: "Q: What happens when my plan quota runs out? Will the system consume my account balance?"
              - generic [ref=e291]:
                - strong [ref=e292]: "A:"
                - text: No. GLM calls made in supported tools will
                - strong [ref=e293]: only
                - text: use your Coding Plan quota.
              - list [ref=e294]:
                - listitem [ref=e295]:
                  - text: Once the quota is used up, you’ll need to wait until the next
                  - strong [ref=e296]: 5-hour cycle
                  - text: for it to refresh. The system will not deduct from your account balance.
                - listitem [ref=e297]: Users subscribed to the Coding Plan can only make calls via the plan’s quota in supported tools. API calls outside the plan are not available.
              - separator [ref=e298]
              - heading "Navigate to header MCP Call" [level=2] [ref=e299]:
                - link "Navigate to header" [ref=e300] [cursor=pointer]:
                  - /url: "#mcp-call"
                  - img [ref=e302]
                - generic [ref=e304] [cursor=pointer]: MCP Call
              - strong [ref=e306]: Q：Which plan supports Vision Understanding, Web Search and Web Reader MCP tools?
              - generic [ref=e307]:
                - strong [ref=e308]: A：
                - text: All plans support these MCP tools, but the Lite plan includes only a limited quota for trial purposes.
              - separator [ref=e309]
              - strong [ref=e311]: Q：What is the quota of Vision Understanding, Web Search and Web Reader MCP in the plan?
              - generic [ref=e312]:
                - strong [ref=e313]: A：
                - text: "The MCP quotas for the Lite, Pro and Max plans are as follows:"
              - list [ref=e314]:
                - listitem [ref=e315]:
                  - strong [ref=e316]: Lite Plan
                  - text: ": Include a total of 100 web searches and web readers per month, along with the 5-hour maximum prompt resource pool of the package for vision understanding."
                - listitem [ref=e317]:
                  - strong [ref=e318]: Pro Plan
                  - text: ": Include a total of 1,000 web searches and web readers per month, along with the 5-hour maximum prompt resource pool of the package for vision understanding."
                - listitem [ref=e319]:
                  - strong [ref=e320]: Max Plan
                  - text: ": Include a total of 4,000 web searches and web readers per month, along with the 5-hour maximum prompt resource pool of the package for vision understanding."
              - separator [ref=e321]
              - strong [ref=e323]: Q：Besides using the GLM Coding Plan resource package, can I use other methods to call these three MCP tools for Vision Understanding, Web Search and Web Reader?
              - generic [ref=e324]:
                - strong [ref=e325]: A：
                - text: Other than the resource package, we currently do not provide any other access solutions for calling these three MCP tools. If you use other similar MCP tools and incur billing issues during their use, such issues are not within the scope of this package.
              - separator [ref=e326]
              - heading "Navigate to header Subscription Management" [level=2] [ref=e327]:
                - link "Navigate to header" [ref=e328] [cursor=pointer]:
                  - /url: "#subscription-management"
                  - img [ref=e330]
                - generic [ref=e332] [cursor=pointer]: Subscription Management
              - strong [ref=e334]: "Q: Will my subscription renew automatically?"
              - generic [ref=e335]:
                - strong [ref=e336]: "A:"
                - text: Yes. Your subscription will automatically renew at the end of each billing cycle, and the fee will be charged to your saved payment method.
              - separator [ref=e337]
              - strong [ref=e339]: "Q: How are subscription fees deducted?"
              - generic [ref=e340]:
                - strong [ref=e341]: "A:"
                - text: "The system deducts fees in the following order:"
              - list [ref=e342]:
                - listitem [ref=e343]: Credits balance will be used first.
                - listitem [ref=e344]: If insufficient, cash balance will be used;.
                - listitem [ref=e345]: If still insufficient, the remaining amount will be charged from your linked payment method (e.g., bank card or PayPal).
              - generic [ref=e346]:
                - img "Tip" [ref=e348]
                - generic [ref=e351]: Please note that a small minimum applies when charging your credit card. If the remaining amount is less, we will round up the deduction to meet this minimum.
              - separator [ref=e352]
              - strong [ref=e354]: "Q: How can I cancel my subscription?"
              - generic [ref=e355]:
                - strong [ref=e356]: "A:"
                - text: You can cancel your subscription on the subscription management page. Please make sure to cancel at least 24 hours before your next billing date to avoid auto-renewal. After cancellation, your current plan remains valid until it expires.
              - separator [ref=e357]
              - strong [ref=e359]: "Q: Can I get a refund?"
              - generic [ref=e360]:
                - strong [ref=e361]: "A:"
                - text: Please note that subscriptions are non-refundable once purchased. Even if you haven’t used your full plan, the fees cannot be returned. We recommend choosing a subscription plan and billing cycle that best fits your usage needs.
              - separator [ref=e362]
              - heading "Navigate to header Upgrade your Plan" [level=2] [ref=e363]:
                - link "Navigate to header" [ref=e364] [cursor=pointer]:
                  - /url: "#upgrade-your-plan"
                  - img [ref=e366]
                - generic [ref=e368] [cursor=pointer]: Upgrade your Plan
              - strong [ref=e370]: "Q: How can I upgrade my coding plan?"
              - generic [ref=e371]:
                - strong [ref=e372]: "A:"
                - text: For
                - strong [ref=e373]: same-tier plan upgrades
                - text: (e.g., monthly plan to annual plan), the newly purchased plan will
                - strong [ref=e374]: not take effect immediately
                - text: . It will only become active after the expiration of your current plan, meaning the validity periods of the plans are cumulative.
              - generic [ref=e375]:
                - text: "Example: Upgrading from a"
                - strong [ref=e376]: Lite Monthly Plan
                - text: to a
                - strong [ref=e377]: Lite Annual Plan
                - text: will grant you a total of 13 months of service validity.
              - generic [ref=e378]:
                - text: For
                - strong [ref=e379]: cross-tier plan upgrades
                - text: ", the new plan will take effect immediately. The remaining value of your original plan will be converted into account balance on a pro-rated basis, which can be used to offset the price difference of the upgrade."
              - separator [ref=e380]
              - strong [ref=e382]: "Q: How can I downgrade my plan?"
              - generic [ref=e383]:
                - strong [ref=e384]: "A:"
                - text: "On the subsciption page, select your desired plan. The change will take effect after the current billing cycle ends. You can also cancel your current subscription and re-subscribe to the desired plan after the billing cycle ends. Steps are as follows:"
              - list [ref=e385]:
                - listitem [ref=e386]:
                  - text: Go to your
                  - link "subscription page" [ref=e387] [cursor=pointer]:
                    - /url: https://z.ai/subscribe?utm_source=zai&utm_medium=index&utm_term=glm-coding-plan&utm_campaign=Platform_Ops&_channel_track_key=6lShUDnv
                  - text: .
                - listitem [ref=e388]: Click “Subscribe” and select your desired plan.
                - listitem [ref=e389]: Confirm the change.
                - listitem [ref=e390]: The new plan will take effect after the current billing cycle ends.
              - separator [ref=e391]
              - strong [ref=e393]: "Q: How can I change my billing cycle?"
              - generic [ref=e394]:
                - strong [ref=e395]: "A:"
                - text: "On the subsciption page, select your desired plan. The change will take effect after the current billing cycle ends. You can also cancel your current subscription and re-subscribe to the desired plan after the billing cycle ends. Steps are as follows:"
              - list [ref=e396]:
                - listitem [ref=e397]:
                  - text: Go to your
                  - link "subscription page" [ref=e398] [cursor=pointer]:
                    - /url: https://z.ai/subscribe?utm_source=zai&utm_medium=index&utm_term=glm-coding-plan&utm_campaign=Platform_Ops&_channel_track_key=6lShUDnv
                  - text: .
                - listitem [ref=e399]: Click “Subscribe” and select your desired billing cycle.
                - listitem [ref=e400]: Confirm the change.
                - listitem [ref=e401]: The new cycle will take effect after the current billing period ends.
              - separator [ref=e402]
              - heading "Navigate to header ‘Invite Friends, Get Credits’" [level=2] [ref=e403]:
                - link "Navigate to header" [ref=e404] [cursor=pointer]:
                  - /url: "#‘invite-friends-get-credits’"
                  - img [ref=e406]
                - generic [ref=e408] [cursor=pointer]: ‘Invite Friends, Get Credits’
              - strong [ref=e410]: "Q: Where can I view the credits I earned?"
              - generic [ref=e411]:
                - strong [ref=e412]: "A:"
                - text: You can view your credit rewards in the [Invite Friends, Earn Credits pop-up - Your Credit Rewards] or check the details under [Billing - Transaction History].
              - separator [ref=e413]
              - strong [ref=e415]: "Q: Where can I use my credits? Can I withdraw them?"
              - generic [ref=e416]:
                - strong [ref=e417]: "A:"
                - text: Credits can be used on [Z.ai platform] to offset various purchases, including subscriptions like GLM Coding Plan, resource packs, feature extensions, and API calls.
              - generic [ref=e418]:
                - img "Tip" [ref=e420]
                - generic [ref=e423]: Credits are promotional benefits and cannot be withdrawn, transferred, or refunded.
              - separator [ref=e424]
              - strong [ref=e426]: "Q: How is a successful invitation defined? What does my friend need to do?"
              - generic [ref=e427]:
                - strong [ref=e428]: "A:"
                - text: "A successful invitation must meet all of the following:"
              - list [ref=e429]:
                - listitem [ref=e430]: The referred friend shall access the campaign page through the inviter’s unique referral link or code.
                - listitem [ref=e431]: Your friend is a new user (has never paid for a subscription).
                - listitem [ref=e432]: They complete their first GLM Coding Plan subscription payment within 72 hours.
                - listitem [ref=e433]: The order is not refunded within 24 hours.
              - separator [ref=e434]
              - strong [ref=e436]: "Q: When will I receive the credits after inviting a friend?"
              - generic [ref=e437]:
                - strong [ref=e438]: "A:"
                - text: Credits are usually issued within 24-48 hours after your friend’s payment is confirmed and the order passes review. Check [Finance - Transaction History]. If not received after 72 hours, contact support.
              - separator [ref=e439]
              - strong [ref=e441]: "Q: What does “friend’s actual payment amount” mean? How are credits calculated if a coupon is used?"
              - generic [ref=e442]:
                - strong [ref=e443]: "A:"
                - text: “Actual payment amount” refers to the final cash amount your friend paid for their first order.
              - generic [ref=e444]: "For example: If a plan costs 100 USD, and your friend gets a 50% first-order discount, an extra 10% off from your referral, and uses 5 USD in credits, the final actual payment is 40 USD. Your credits will be calculated based on 40 USD (e.g., 10% of 40 USD = 4 USD). Credit calculation does not include any coupons, discounts, point deductions, or refunded amounts."
              - separator [ref=e445]
              - strong [ref=e447]: "Q: Why didn’t I receive credits after referring a friend?"
              - generic [ref=e448]:
                - strong [ref=e449]: "A:"
                - text: "Common reasons include:"
              - list [ref=e450]:
                - listitem [ref=e451]: Your friend didn’t register using your exclusive link/code.
