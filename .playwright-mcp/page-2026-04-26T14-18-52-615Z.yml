              - separator [ref=e213]
              - strong [ref=e215]: "Q: Why is the quota consumed faster when using GLM-5.1? Is there a way to save quota?"
              - generic [ref=e216]:
                - strong [ref=e217]: "A:"
                - text: As advanced models, GLM-5.1 and GLM-5-Turbo are comparable to Claude Opus model.
                - strong [ref=e218]: Usage for these models will be calculated and deducted at “3 times the standard rate during peak hours and 2 times the standard rate during off-peak hours”;
                - text: we recommend switching to GLM-5.1 for complex tasks and continuing to use GLM-4.7 for general tasks to avoid depleting your plan’s usage quota too quickly.
                - strong [ref=e219]: As a limited-time benefit, GLM-5.1 and GLM-5-Turbo will only consume 1× quota during off-peak hours, valid through the end of April.
              - generic [ref=e220]: "Usage suggestions for more efficient quota utilization:"
              - list [ref=e221]:
                - listitem [ref=e222]: GLM-4.7 is comparable to Claude’s Sonnet-level model, and GLM-4.7 is sufficient for daily development and routine tasks.
                - listitem [ref=e223]: GLM-5.1 and GLM-5-Turbo is comparable to Claude’s Opus-level model, and in high-difficulty scenarios such as complex reasoning and large-scale engineering tasks, it switches to GLM-5.1.
              - generic [ref=e224]: By reasonably combining different model capability levels, it is possible to more efficiently control quota consumption while ensuring effectiveness.
              - strong [ref=e226]: "Recommended Configuration (taking Claude Code as an example):"
              - list [ref=e227]:
                - listitem [ref=e228]:
                  - text: Edit or add the
                  - code [ref=e229]: settings.json
                  - text: file
                - listitem [ref=e230]:
                  - text: "MacOS & Linux:"
                  - code [ref=e231]: ~/.claude/settings.json
                - listitem [ref=e232]:
                  - text: "Windows user directory:"
                  - code [ref=e233]: /.claude/settings.json
                - listitem [ref=e234]: Add or modify the env field inside
                - listitem [ref=e235]:
                  - text: Note to replace the
                  - code [ref=e236]: your_zhipu_api_key
                  - text: inside with the API Key you obtained in the previous step.
              - generic [ref=e237]:
                - button "Copy the contents from the code block" [ref=e240] [cursor=pointer]:
