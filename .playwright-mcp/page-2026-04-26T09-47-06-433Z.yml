              - generic [ref=e281]:
                - text: Lemonade is an open-source SDK and local LLM server focused on making it easy to run and experiment with large language models (LLMs) on your own PC, with special acceleration paths for NPUs (Ryzen™ AI) and GPUs (Strix Halo and Radeon™).
                - paragraph [ref=e282]: Why?
                - paragraph [ref=e283]:
                  - text: There are three qualities needed in a local LLM serving stack, and none of the market leaders (
                  - emphasis [ref=e284]: Ollama
                  - text: ", LM Studio, or using llama.cpp by itself) deliver all three:"
                  - text: 1. Use the best backend for the user’s hardware, even if it means integrating multiple inference engines (llama.cpp, ONNXRuntime, etc.) or custom builds (e.g., llama.cpp with ROCm betas).
                  - text: 2. Zero friction for both users and developers from onboarding to apps integration to high performance.
                  - text: 3. Commitment to open source principles and collaborating in the community.
                - paragraph [ref=e285]: "Lemonade Overview:"
                - paragraph [ref=e286]:
                  - text: "Simple LLM serving: Lemonade is a drop-in local server that presents an OpenAI-compatible API, so any app or tool that talks to OpenAI’s endpoints will “just work” with Lemonade’s local models."
                  - text: "Performance focus: Powered by llama.cpp (Vulkan and ROCm for GPUs) and ONNXRuntime (Ryzen AI for NPUs and iGPUs), Lemonade squeezes the best out of your PC, no extra code or hacks needed."
                  - text: "Cross-platform: One-click installer for Windows (with GUI), pip/source install for Linux."
                  - text: "Bring your own models: Supports GGUFs and ONNX. Use Gemma, Llama, Qwen, Phi and others out-of-the-box. Easily manage, pull, and swap models."
                  - text: "Complete SDK: Python API for LLM generation, and CLI for benchmarking/testing."
                  - text: "Open source: Apache 2.0 (core server and SDK), no feature gating, no enterprise “gotchas.” All server/API logic and performance code is fully open; some software the NPU depends on is proprietary, but we strive for as much openness as possible (see our GitHub for details). Active collabs with GGML, Hugging Face, and ROCm/TheRock."
                - paragraph [ref=e287]: "Get started:"
                - paragraph [ref=e288]:
                  - text: Windows? Download the latest GUI installer from
                  - link "https://lemonade-server.ai/" [ref=e289] [cursor=pointer]:
                    - /url: https://lemonade-server.ai/
                - paragraph [ref=e290]:
                  - text: Linux? Install with pip or from source (
                  - link "https://lemonade-server.ai/" [ref=e291] [cursor=pointer]:
                    - /url: https://lemonade-server.ai/
                  - text: )
                - paragraph [ref=e292]:
                  - text: "Docs:"
                  - link "https://lemonade-server.ai/docs/" [ref=e293] [cursor=pointer]:
                    - /url: https://lemonade-server.ai/docs/
                - paragraph [ref=e294]:
                  - text: "Discord for banter/support/feedback:"
                  - link "https://discord.gg/5xXzkMu8Zk" [ref=e295] [cursor=pointer]:
                    - /url: https://discord.gg/5xXzkMu8Zk
                - paragraph [ref=e296]: How do you use it?
                - paragraph [ref=e297]:
                  - text: Click on lemonade-server from the start menu
                  - text: Open http://localhost:8000 in your browser for a web ui with chat, settings, and model management.
                  - text: Point any OpenAI-compatible app (chatbots, coding assistants, GUIs, etc.) at http://localhost:8000/api/v1
                  - text: Use the CLI to run/load/manage models, monitor
                  - emphasis [ref=e298]: usage
                  - text: ", and tweak settings such as temperature, top-p and top-k."
                  - text: Integrate via the Python API for direct access in your own apps or research.
                - paragraph [ref=e299]: Who is it for?
                - paragraph [ref=e300]:
                  - text: "Developers: Integrate LLMs into your apps with standardized APIs and zero device-specific code, using popular tools and frameworks."
                  - text: "LLM Enthusiasts, plug-and-play with:"
                  - text: Morphik AI (contextual RAG/PDF Q&A)
                  - text: Open WebUI (modern local chat interfaces)
                  - text: Continue.dev (VS Code AI coding copilot)
                  - text: …and many more integrations in progress!
                  - text: "Privacy-focused users: No"
                  - emphasis [ref=e301]: cloud
                  - text: calls, run everything locally, including advanced multi-modal models if your hardware supports it.
                - paragraph [ref=e302]: Why does this matter?
                - paragraph [ref=e303]:
                  - text: Every month, new on-device models (e.g., Qwen3 MOEs and Gemma 3) are getting closer to the capabilities of
                  - emphasis [ref=e304]: cloud
                  - text: LLMs. We predict a lot of LLM use will move local for cost reasons alone.
                  - text: Keeping your data and AI workflows on your own hardware is finally practical, fast, and private, no vendor lock-in, no ongoing API fees, and no sending your sensitive info to remote servers.
                  - text: Lemonade lowers friction for running these next-gen models, whether you want to experiment, build, or deploy at the edge.
                  - text: Would love your feedback!
                  - text: Are you running LLMs on AMD hardware? What’s missing, what’s broken, what would you like to see next? Any pain points from
                  - emphasis [ref=e305]: Ollama
                  - text: ", LM Studio, or others you wish we solved?"
                  - text: Share your stories, questions, or rant at us.
                - paragraph [ref=e306]: "Links:"
                - paragraph [ref=e307]:
                  - text: "Download & Docs:"
                  - link "https://lemonade-server.ai/" [ref=e308] [cursor=pointer]:
                    - /url: https://lemonade-server.ai/
                - paragraph [ref=e309]:
                  - text: "GitHub:"
                  - link "https://github.com/lemonade-sdk/lemonade" [ref=e310] [cursor=pointer]:
                    - /url: https://github.com/lemonade-sdk/lemonade
                - paragraph [ref=e311]:
                  - text: "Discord:"
                  - link "https://discord.gg/5xXzkMu8Zk" [ref=e312] [cursor=pointer]:
                    - /url: https://discord.gg/5xXzkMu8Zk
                - paragraph [ref=e313]: Thanks HN!
