            - generic [ref=e383]:
              - link "1 points" [ref=e385] [cursor=pointer]:
                - /url: https://news.ycombinator.com/item?id=47087684
              - text: "|"
              - link "bekirdag" [ref=e387] [cursor=pointer]:
                - /url: https://news.ycombinator.com/user?id=bekirdag
              - text: "|"
              - link "2 months ago" [ref=e389] [cursor=pointer]:
                - /url: https://news.ycombinator.com/item?id=47087684
              - text: "|"
              - link "0 comments" [ref=e391] [cursor=pointer]:
                - /url: https://news.ycombinator.com/item?id=47087684
              - generic [ref=e393]:
                - text: Hi HN,
                - paragraph [ref=e394]:
                  - text: I use LLMs every day for software development, and wanted to have a better experience by reducing the token
                  - emphasis [ref=e395]: usage
                  - text: and providing digested information about the codebase to the agent.
                - paragraph [ref=e396]: "So I built Docdex. The idea was simple: a local, persistent layer that preprocesses and structures your project so the model can spend its context window on the actual problem, not on rediscovering what already exists."
                - paragraph [ref=e397]: It started as a document indexer in Rust, built on Tantivy for proper ranked full-text search.
                - paragraph [ref=e398]: Then it kept growing. I added code search, AST-based symbol indexing, a directed symbol graph for impact analysis ("what breaks if I change this function?"), repo memory for project-level facts, and agent memory so the LLM can persist preferences across sessions.
                - paragraph [ref=e399]: "One architectural decision I'm particularly happy with: it runs as a single daemon. MCP servers have a habit of getting stuck, each tool call spawning processes, LLMs not cleaning up after themselves, multiple SSE connections fighting over resources. Running everything as one lightweight background service sidesteps most of that. It handles multiple repos, re-indexes on changes, and stays out of the way."
                - paragraph [ref=e400]:
                  - text: I also added web search, but handled locally. During setup it can install
                  - emphasis [ref=e401]: Ollama
                  - text: ", pull `nomic-embed-text` for embeddings, and optionally `phi3.5` for lightweight reasoning. Search results get scored and filtered locally before anything hits a paid API. Brave Search works best, but Google/Bing work too with API keys."
                - paragraph [ref=e402]:
                  - text: There's also job delegation, expensive frontier models can offload simpler subtasks to a local
                  - emphasis [ref=e403]: Ollama
                  - text: model, which cuts paid token
                  - emphasis [ref=e404]: usage
                  - text: noticeably in practice.
                - paragraph [ref=e405]: "Supported languages for impact graph reasoning: Rust, Python, JS/TS, Go, Java, C++, and more."
                - paragraph [ref=e406]: You can also use it standalone, as a local search engine for your docs, a plain HTTP server, or a web search and summarization tool. It's not glued to any particular AI workflow.
                - paragraph [ref=e407]:
                  - text: "How to install:"
                  - text: npm i -g docdex
                - paragraph [ref=e408]:
                  - text: "Setup:"
                  - text: docdex setup
                - paragraph [ref=e409]:
                  - text: "Website:"
                  - link "https://docdex.org" [ref=e410] [cursor=pointer]:
                    - /url: https://docdex.org
                  - text: ", Repo:"
                  - link "https://github.com/bekirdag/docdex" [ref=e411] [cursor=pointer]:
                    - /url: https://github.com/bekirdag/docdex
                - paragraph [ref=e412]: Fully open source, free to use. API keys for web search are optional.
                - paragraph [ref=e413]:
                  - text: It's genuinely made my daily dev workflow better, fewer tokens, more consistent answers, less time reexplaining things. I plan to keep developing it and may eventually offer optional paid services (like delegated
                  - emphasis [ref=e414]: cloud
                  - text: model jobs via OpenRouter), but the core will stay open.
                - paragraph [ref=e415]: Would love feedback, especially from people building serious AI dev tooling.
