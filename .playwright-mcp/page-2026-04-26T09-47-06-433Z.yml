              - text: "|"
              - link "PL_Venard" [ref=e245] [cursor=pointer]:
                - /url: https://news.ycombinator.com/user?id=PL_Venard
              - text: "|"
              - link "2 years ago" [ref=e247] [cursor=pointer]:
