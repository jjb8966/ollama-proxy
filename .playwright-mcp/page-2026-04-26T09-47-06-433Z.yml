              - generic [ref=e73]:
                - text: I built MCPlexor to solve a token waste problem I kept running into with MCP-based agents.
                - paragraph [ref=e74]:
                  - text: "The Problem:"
                  - text: MCP (Model Context Protocol) is great for giving LLMs access to external tools. But if you connect multiple servers (GitHub, Linear, Postgres, Slack), you end up with 40-50k tokens of tool definitions injected into every request – before the agent even does anything.
                - paragraph [ref=e75]: On a 200k context model, that's 25% gone. On smaller models, it's worse. And most runs only use 1-2 tools.
                - paragraph [ref=e76]:
                  - text: "The Solution:"
                  - text: "MCPlexor sits between your agent and your MCP servers. Instead of loading all tool definitions upfront:"
                - paragraph [ref=e77]:
                  - text: Agent asks for a capability ("create an issue")
                  - text: MCPlexor routes to the right server using semantic matching
                  - text: Only relevant tools get exposed
                  - text: "Result: ~500 tokens overhead instead of ~20k."
                - paragraph [ref=e78]:
                  - text: "Technical Details:"
                  - text: "- Written in Go, single binary, no runtime deps"
                  - text: "- Supports both stdio and HTTP transports"
                  - text: "- Stores credentials in OS keychain (macOS Keychain, Windows Credential Manager, Linux keyring via zalando/go-keyring)"
                  - text: "- Works with Claude Desktop, Cursor, Augment Code, or any MCP-compatible client"
                - paragraph [ref=e79]:
                  - text: The routing logic can run entirely locally using
                  - emphasis [ref=e80]: Ollama
                  - text: . No API calls, no cost, works offline.
                - paragraph [ref=e81]:
                  - text: "Business Model (for transparency):"
                  - text: "- Local/"
                  - emphasis [ref=e82]: Ollama
                  - text: "users: completely free"
                  - text: "-"
                  - emphasis [ref=e83]: Cloud
                  - text: "tier (on waitlist): we run inference on efficient small models instead of Opus/Pro, pass on savings, take a margin"
                  - text: The bet is that routing is a narrow enough task that a fine-tuned 7B model does it as well as a frontier model. Early testing suggests this works.
                - paragraph [ref=e84]:
                  - text: "CLI uploads:"
                  - link "https://github.com/arustagi101/mcplexor" [ref=e85] [cursor=pointer]:
                    - /url: https://github.com/arustagi101/mcplexor
                  - text: "Install: `curl -fsSL"
                  - link "https://mcplexor.com/install.sh" [ref=e86] [cursor=pointer]:
                    - /url: https://mcplexor.com/install.sh
                  - text: "| bash`"
                  - text: Happy to answer questions about the architecture, the routing approach, or anything else.
