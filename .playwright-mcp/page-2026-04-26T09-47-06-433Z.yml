              - generic [ref=e139]:
                - text: I built llm‑use, an open‑source Python framework for orchestrating large language model workflows across local and
                - emphasis [ref=e140]: cloud
                - text: models with smart routing, cost tracking, session logs, optional web scraping, and optional MCP integration. It’s designed for agent workflows (planner + workers + synthesis) that leverage multiple LLMs without manual switching or custom glue code.
