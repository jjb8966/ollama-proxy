              - generic [ref=e221]:
                - text: Hi HN,
                - paragraph [ref=e222]: I built a Chrome extension that flips vocabulary learning on its head. Instead of flashcards where you passively recognise words, Wordwright.ai makes you actively use them.
                - paragraph [ref=e223]: "How it works:"
                - paragraph [ref=e224]:
                  - text: Add words you encounter while browsing. When it's time to review, you write sentences using the word. AI evaluates your
                  - emphasis [ref=e225]: usage
                  - text: — not just right/wrong, but explains nuances like collocations, tone, and common mistakes.
                - paragraph [ref=e226]: "What makes it different:"
                - paragraph [ref=e227]: Production over recognition — Writing forces deeper processing than "did I remember the meaning?"
                - paragraph [ref=e228]: AI feedback — Not just "correct/incorrect" but "this is technically right, but native speakers would say it this way instead"
                - paragraph [ref=e229]:
                  - text: Privacy option — Works with OpenRouter (
                  - emphasis [ref=e230]: cloud
                  - text: ) or
                  - emphasis [ref=e231]: Ollama
                  - text: (local). Your vocabulary stays on your machine if you want
                - paragraph [ref=e232]: Semantic distractors — Fill-in-the-blank questions use near-synonyms, not random words. Tests whether you really understand the nuance
                - paragraph [ref=e233]: Spaced repetition — SM-2 algorithm. Reviews pop up as gentle reminders when you open new tabs
                - paragraph [ref=e234]: Built because I was frustrated with Anki for vocabulary. Knowing a definition isn't the same as being able to use a word naturally in conversation.
