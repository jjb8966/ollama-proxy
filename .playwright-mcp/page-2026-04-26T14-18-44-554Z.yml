                - generic [ref=e239] [cursor=pointer]: Explanation of Rate Limits Concepts
              - list [ref=e240]:
                - listitem [ref=e241]: "Concurrency: The maximum number of requests from you that we can process at the same time."
                - listitem [ref=e242]: "RPM: Requests per minute, which means the maximum number of requests you can send to us in one minute."
                - listitem [ref=e243]: "TPM: Tokens per minute, which means the maximum number of tokens you can interact with us in one minute."
                - listitem [ref=e244]: "TPD: Tokens per day, which means the maximum number of tokens you can interact with us in one day."
              - generic [ref=e245]:
                - text: For more details, please refer to the
                - link "Rate Limits" [ref=e246] [cursor=pointer]:
                  - /url: /docs/introduction#rate-limits
                - text: section.
              - heading "Navigate to header Why Do We Implement Rate Limits?" [level=2] [ref=e247]:
                - link "Navigate to header" [ref=e248] [cursor=pointer]:
                  - /url: "#why-do-we-implement-rate-limits"
                  - img [ref=e250]
                - generic [ref=e252] [cursor=pointer]: Why Do We Implement Rate Limits?
              - generic [ref=e253]: "Rate limits are a common practice for API interfaces, and there are several reasons for it:"
              - list [ref=e254]:
                - listitem [ref=e255]: They help prevent abuse or misuse of the API. For example, malicious actors might try to overwhelm the API with a large number of requests, attempting to overload it or cause service disruptions. By setting rate limits, we can guard against such behavior.
                - listitem [ref=e256]: Rate limits ensure fair access to the API for everyone. If one person or organization sends too many requests, it could slow down the API for everyone else. By limiting the number of requests a single user can send, we ensure that as many people as possible can use the API without experiencing slowdowns.
                - listitem [ref=e257]: Rate limits help us manage the overall load on our cluster. A sudden surge in requests to the API could put pressure on the servers and lead to performance issues. By setting rate limits, we can maintain a smooth and consistent experience for all users.
              - heading "Navigate to header Special Notes" [level=2] [ref=e258]:
                - link "Navigate to header" [ref=e259] [cursor=pointer]:
                  - /url: "#special-notes"
                  - img [ref=e261]
                - generic [ref=e263] [cursor=pointer]: Special Notes
              - list [ref=e264]:
                - listitem [ref=e265]: We will do our best to ensure normal usage for users, but when the cluster load reaches its capacity limit, we may take temporary measures to adjust the rate limits.
                - listitem [ref=e266]: Vouchers do not count towards the cumulative recharge total.
