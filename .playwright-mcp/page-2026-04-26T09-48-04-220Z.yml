                - generic [ref=e183]:
                  - generic [ref=e185]:
                    - paragraph [ref=e186]: Hey Ollama team,
                    - paragraph [ref=e187]: I've been running autonomous agents using Ollama Cloud models and running into frequent 503 Service Unavailable errors. Thought I'd report this since it's making the cloud models pretty unreliable for production use.
                    - heading "What's happening" [level=2] [ref=e188]
                    - paragraph [ref=e189]: "Requests to cloud models randomly fail with:"
                    - paragraph [ref=e190]: "This happens with:"
                    - list [ref=e191]:
                      - listitem [ref=e192]: glm-5:cloud
                      - listitem [ref=e193]: glm-5.1:cloud
                      - listitem [ref=e194]: minimax-m2.7:cloud
                      - listitem [ref=e195]: kimi-k2.5:cloud
                    - heading "How often" [level=2] [ref=e196]
                    - paragraph [ref=e197]: Multiple times per hour. Sometimes a single request works, the next one fails with 503, then it works again. It's intermittent but frequent enough to break agent workflows.
                    - heading "Impact" [level=2] [ref=e198]
                    - list [ref=e199]:
                      - listitem [ref=e200]: Agent requests timeout mid-conversation
                      - listitem [ref=e201]: Cron jobs fail unexpectedly
                      - listitem [ref=e202]: Users experience broken interactions in Telegram/Discord bots
                    - heading "What I've tried" [level=2] [ref=e203]
                    - list [ref=e204]:
                      - listitem [ref=e205]: Retry logic with exponential backoff
                      - listitem [ref=e206]: Falling back to different models
                      - listitem [ref=e207]: None of it really helps when the 503s are this frequent
                    - heading "Setup" [level=2] [ref=e208]
                    - list [ref=e209]:
                      - listitem [ref=e210]: Ollama running in Docker
                      - listitem [ref=e211]: Using the model suffix to hit ollama.com:443
                      - listitem [ref=e212]: Fairly standard setup otherwise
                    - heading "Would be helpful" [level=2] [ref=e213]
                    - list [ref=e214]:
                      - listitem [ref=e215]: Some visibility into when/why 503s happen (rate limiting vs capacity issues?)
                      - listitem [ref=e216]: A retry-after header so we can back off properly
                      - listitem [ref=e217]: Maybe a status page for Ollama Cloud uptime?
                    - paragraph [ref=e218]: Thanks for the great work on Ollama! Happy to provide more details if needed.
