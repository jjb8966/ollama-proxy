              - generic [ref=e1533]:
                - paragraph [ref=e1534]:
                  - text: OpenCode는 세션 제목 생성과 같은 일부 AI 작업을 위해 작은 모델을 사용합니다. 기본적으로 Zen에서 호스팅되는 gpt-5-nano를 사용하도록 구성됩니다. OpenCode를 자체 호스팅 GitLab 인스턴스만 사용하도록 제한하려면
                  - code [ref=e1535]: "`opencode.json`"
                  - text: 파일에 다음을 추가하십시오. 세션 공유를 비활성화하는 것도 권장합니다.
                - figure [ref=e1537]:
                  - code [ref=e1539]:
                    - generic [ref=e1541]: "{"
                    - generic [ref=e1543]: "\"$schema\": \"https://opencode.ai/config.json\","
                    - generic [ref=e1545]: "\"small_model\": \"gitlab/duo-chat-haiku-4-5\","
                    - generic [ref=e1547]: "\"share\": \"disabled\""
                    - generic [ref=e1549]: "}"
                  - button "Copy to clipboard" [ref=e1551] [cursor=pointer]
