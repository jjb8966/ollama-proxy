      - heading "Cloud API access" [level=3] [ref=e110]
      - paragraph [ref=e111]:
        - text: Cloud models such as
        - code [ref=e112]: minimax-m2:cloud
        - text: "can also be accessed directly via ollama.com’s cloud API:"
      - paragraph [ref=e113]:
        - text: First,
        - link "create an API key" [ref=e114] [cursor=pointer]:
          - /url: https://ollama.com/settings/keys
        - text: ", and set it in your environment"
      - code [ref=e116]: export OLLAMA_API_KEY="your_api_key_here"
      - paragraph [ref=e117]: Then, call ollama.com’s API
      - code [ref=e119]:
        - text: curl https://ollama.com/api/chat \ -H
        - generic [ref=e120]: "\"Authorization: Bearer $OLLAMA_API_KEY\""
        - text: "\\ -d '{ \"model\": \"minimax-m2\", \"messages\": [{ \"role\": \"user\", \"content\": \"Write a snake game in HTML.\" }] }'"
      - paragraph [ref=e121]:
        - text: For more information see the Ollama’s
        - link "API documentation" [ref=e122] [cursor=pointer]:
          - /url: https://docs.ollama.com/cloud#cloud-api-access
        - text: .
