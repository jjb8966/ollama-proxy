  - article [ref=e21]:
    - heading "MiniMax M2" [level=1] [ref=e22]
    - heading "October 28, 2025" [level=2] [ref=e23]
    - generic [ref=e24]:
      - paragraph [ref=e25]:
        - img "MiniMax M2 model banner" [ref=e26]
      - paragraph [ref=e27]: MiniMax M2 is now available on Ollama’s cloud. It’s a model built for coding and agentic workflows.
      - heading "Get Started" [level=3] [ref=e28]
      - code [ref=e30]: ollama run minimax-m2:cloud
      - heading "Highlights" [level=3] [ref=e31]
      - paragraph [ref=e32]:
        - strong [ref=e33]: Superior Intelligence
        - text: . According to benchmarks from Artificial Analysis, MiniMax-M2 demonstrates highly competitive general intelligence across mathematics, science, instruction following, coding, and agentic tool use.
        - strong [ref=e34]: "Its composite score ranks #1 among open-source models globally"
        - text: .
      - paragraph [ref=e35]:
        - strong [ref=e36]: Advanced Coding
        - text: . Engineered for end-to-end developer workflows, MiniMax-M2 excels at multi-file edits, coding-run-fix loops, and test-validated repairs. Strong performance on Terminal-Bench and (Multi-)SWE-Bench–style tasks demonstrates practical effectiveness in terminals, IDEs, and CI across languages.
      - paragraph [ref=e37]:
        - strong [ref=e38]: Agent Performance
        - text: . MiniMax-M2 plans and executes complex, long-horizon toolchains across shell, browser, retrieval, and code runners. In BrowseComp-style evaluations, it consistently locates hard-to-surface sources, maintains traceable evidence, and gracefully recovers from flaky steps.
      - paragraph [ref=e39]:
        - strong [ref=e40]: Efficient Design
        - text: . With 10 billion activated parameters (230 billion in total), MiniMax-M2 delivers lower latency, lower cost, and higher throughput for interactive agents and batched sampling—perfectly aligned with the shift toward highly deployable models that still shine on coding and agentic tasks.
      - heading "Benchmarks" [level=3] [ref=e41]
      - paragraph [ref=e42]: MiniMax M2 comparison with several other mainstream models
      - paragraph [ref=e43]:
        - img "MiniMax M2 model benchmark" [ref=e44]
      - paragraph [ref=e45]: Artificial Analysis intelligence index
      - paragraph [ref=e46]:
        - img "Minimax artificial analysis" [ref=e47]
      - heading "Usage with VS Code" [level=3] [ref=e48]
      - paragraph [ref=e49]: "First, pull the coding models so they can be accessed via VS Code:"
      - code [ref=e51]: ollama pull minimax-m2:cloud
      - list [ref=e52]:
        - listitem [ref=e53]: Open the copilot chat sidebar
        - listitem [ref=e54]:
          - text: Select the model dropdown →
          - strong [ref=e55]: Manage models
        - listitem [ref=e56]:
          - text: Click on
          - strong [ref=e57]: Ollama
          - text: under
          - strong [ref=e58]: Provider Dropdown,
          - text: then select desired models
        - listitem [ref=e59]:
          - text: Select the model dropdown → and choose the model (e.g.
          - code [ref=e60]: minimax-m2:cloud
          - text: )
      - heading "Usage with Zed" [level=3] [ref=e61]
      - paragraph [ref=e62]: "First pull the coding models so they can be accessed via Zed:"
      - code [ref=e64]: ollama pull minimax-m2:cloud
      - paragraph [ref=e65]:
        - text: Then, open
        - link "Zed" [ref=e66] [cursor=pointer]:
          - /url: https://zed.dev/download
        - text: (now available for Windows!)
      - list [ref=e67]:
        - listitem [ref=e68]: Click on the agent panel button (glittering stars)
        - listitem [ref=e69]:
          - text: Click on the
          - strong [ref=e70]: model dropdown
          - text: →
          - strong [ref=e71]: Configure
        - listitem [ref=e72]:
          - text: Select
          - strong [ref=e73]: LLM providers
          - text: →
          - strong [ref=e74]: Ollama
        - listitem [ref=e75]:
          - text: Confirm the
          - strong [ref=e76]: Host URL
          - text: is
          - strong [ref=e77]:
            - code [ref=e78]: http://localhost:11434
          - text: ", then click"
          - strong [ref=e79]: Connect
        - listitem [ref=e80]:
          - text: Select a model under
          - strong [ref=e81]: Ollama
      - heading "Usage with Droid" [level=3] [ref=e82]
      - paragraph [ref=e83]:
        - text: First,
        - link "install Droid" [ref=e84] [cursor=pointer]:
          - /url: https://docs.factory.ai/cli/getting-started/quickstart
        - text: ":"
      - code [ref=e86]: curl -fsSL https://app.factory.ai/cli | sh
      - paragraph [ref=e87]:
        - text: Add the following configuration to
        - code [ref=e88]: ~/.factory/config.json
        - text: ":"
      - code [ref=e90]: "{ \"custom_models\": [ { \"model_display_name\": \"MiniMax-M2\", \"model\": \"minimax-m2:cloud\", \"base_url\": \"http://localhost:11434/v1\", \"api_key\": \"not-needed\", \"provider\": \"generic-chat-completion-api\", \"max_tokens\": 16384 } ] }"
      - paragraph [ref=e91]:
        - text: Then run Droid and type
        - code [ref=e92]: /model
        - text: "to change to the model:"
      - code [ref=e94]: ╭──────────────────────────────────────────────────╮ │ > MiniMax-M2 [current] │ │ Qwen3-Coder-480B │ │ │ │ ↑/↓ to navigate, Enter to select, ESC to go back │ ╰──────────────────────────────────────────────────╯
