            - paragraph [ref=e813]:
              - text: 사용 기록에서
              - emphasis [ref=e814]: Claude Haiku 3.5
              - text: 를 볼 수 있습니다. 이는 세션 제목을 생성할 때 사용되는
              - link "저비용 모델" [ref=e815] [cursor=pointer]:
