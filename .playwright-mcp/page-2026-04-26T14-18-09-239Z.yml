            - paragraph [ref=e874]: 모든 모델은 미국에서 호스팅됩니다. provider는 zero-retention 정책을 따르며, 다음 예외를 제외하고는 데이터를 모델 학습에 사용하지 않습니다.
            - list [ref=e875]:
              - listitem [ref=e876]: "Big Pickle: 무료 제공 기간에는 수집된 데이터가 모델 개선에 사용될 수 있습니다."
              - listitem [ref=e877]: "MiniMax M2.5 Free: 무료 제공 기간에는 수집된 데이터가 모델 개선에 사용될 수 있습니다."
              - listitem [ref=e878]: "Ling 2.6 Flash Free: 무료 제공 기간에는 수집된 데이터가 모델 개선에 사용될 수 있습니다."
              - listitem [ref=e879]: "Hy3 Preview Free: 무료 제공 기간에는 수집된 데이터가 모델 개선에 사용될 수 있습니다."
              - listitem [ref=e880]:
                - text: "Nemotron 3 Super Free(NVIDIA 무료 엔드포인트):"
                - link "NVIDIA API Trial Terms of Service" [ref=e881] [cursor=pointer]:
                  - /url: https://assets.ngc.nvidia.com/products/api-catalog/legal/NVIDIA%20API%20Trial%20Terms%20of%20Service.pdf
                - text: 에 따라 제공됩니다. 평가판 전용이며 프로덕션 환경이나 민감한 데이터에는 사용할 수 없습니다. NVIDIA는 자사 모델과 서비스를 개선하기 위해 프롬프트와 출력을 기록합니다. 개인 정보나 기밀 데이터는 제출하지 마세요.
              - listitem [ref=e882]:
                - text: "OpenAI APIs: 요청은"
                - link "OpenAI’s Data Policies" [ref=e883] [cursor=pointer]:
                  - /url: https://platform.openai.com/docs/guides/your-data
                - text: 에 따라 30일 동안 보관됩니다.
              - listitem [ref=e884]:
                - text: "Anthropic APIs: 요청은"
                - link "Anthropic’s Data Policies" [ref=e885] [cursor=pointer]:
                  - /url: https://docs.anthropic.com/en/docs/claude-code/data-usage
                - text: 에 따라 30일 동안 보관됩니다.
            - separator [ref=e886]
            - heading "팀용 기능" [level=2] [ref=e887]:
              - link "팀용 기능" [ref=e888]:
                - /url: "#팀용-기능"
            - paragraph [ref=e889]: Zen은 팀에서도 매우 잘 작동합니다. 팀원을 초대하고, 역할을 할당하고, 팀에서 사용할 모델을 선별하는 등 다양한 작업을 할 수 있습니다.
            - complementary "참고" [ref=e890]:
              - paragraph [ref=e891]:
                - img [ref=e892]
                - text: 참고
              - paragraph [ref=e895]: 워크스페이스는 현재 beta의 일부로 팀에 무료 제공되고 있습니다.
            - paragraph [ref=e896]: 현재 beta의 일부로 팀의 워크스페이스 관리도 무료입니다. 가격에 대한 더 자세한 내용은 곧 공유할 예정입니다.
            - separator [ref=e897]
            - heading "역할" [level=3] [ref=e898]:
              - link "역할" [ref=e899]:
                - /url: "#역할"
            - paragraph [ref=e900]: 워크스페이스에 팀원을 초대하고 역할을 할당할 수 있습니다.
            - list [ref=e901]:
              - listitem [ref=e902]:
                - strong [ref=e903]: Admin
                - text: ": 모델, 멤버, API 키, 결제를 관리"
              - listitem [ref=e904]:
                - strong [ref=e905]: Member
                - text: ": 자신의 API 키만 관리"
            - paragraph [ref=e906]: Admin은 비용을 통제할 수 있도록 각 멤버의 월간 지출 한도도 설정할 수 있습니다.
            - separator [ref=e907]
            - heading "모델 접근" [level=3] [ref=e908]:
              - link "모델 접근" [ref=e909]:
                - /url: "#모델-접근"
            - paragraph [ref=e910]: Admin은 워크스페이스에서 특정 모델을 활성화하거나 비활성화할 수 있습니다. 비활성화된 모델로 보내는 요청은 오류를 반환합니다.
            - paragraph [ref=e911]: 이는 데이터를 수집하는 모델의 사용을 비활성화하고 싶을 때 유용합니다.
            - separator [ref=e912]
            - heading "Bring your own key" [level=3] [ref=e913]:
              - link "Bring your own key" [ref=e914]:
                - /url: "#bring-your-own-key"
            - paragraph [ref=e915]: Zen의 다른 모델도 계속 사용하면서, 자체 OpenAI 또는 Anthropic API 키를 사용할 수 있습니다.
            - paragraph [ref=e916]: 자체 키를 사용하면 토큰 요금은 Zen이 아니라 provider가 직접 청구합니다.
            - paragraph [ref=e917]: 예를 들어 조직에서 이미 OpenAI나 Anthropic 키를 가지고 있고, Zen이 제공하는 키 대신 그 키를 사용하고 싶을 수 있습니다.
            - separator [ref=e918]
            - heading "목표" [level=2] [ref=e919]:
              - link "목표" [ref=e920]:
                - /url: "#목표"
            - paragraph [ref=e921]: OpenCode Zen을 만든 이유는 다음과 같습니다.
            - list [ref=e922]:
              - listitem [ref=e923]:
                - text: 코딩 에이전트에 가장 적합한 모델/provider를
                - strong [ref=e924]: 벤치마크
                - text: 하기 위해.
              - listitem [ref=e925]:
                - text: 성능을 낮추거나 더 저렴한 provider로 라우팅하지 않고,
                - strong [ref=e926]: 최고 품질
                - text: 의 선택지에 접근하기 위해.
              - listitem [ref=e927]:
                - text: 원가로 판매해
                - strong [ref=e928]: 가격 인하
                - text: 를 그대로 반영하기 위해. 따라서 붙는 마진은 처리 수수료를 충당하기 위한 수준뿐입니다.
              - listitem [ref=e929]:
                - text: 다른 코딩 에이전트와도 함께 사용할 수 있게 해
