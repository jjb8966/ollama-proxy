              - text: 입니다.
            - complementary "참고" [ref=e816]:
              - paragraph [ref=e817]:
                - img [ref=e818]
                - text: 참고
              - paragraph [ref=e821]: 신용카드 수수료는 원가 그대로 전달됩니다(거래당 4.4% + $0.30). 그 외 추가 요금은 부과하지 않습니다.
            - paragraph [ref=e822]: "무료 모델:"
            - list [ref=e823]:
              - listitem [ref=e824]: MiniMax M2.5 Free는 한정된 기간 동안 OpenCode에서 제공됩니다. 팀은 이 기간에 피드백을 수집하고 모델을 개선합니다.
              - listitem [ref=e825]: Ling 2.6 Flash Free는 한정된 기간 동안 OpenCode에서 제공됩니다. 팀은 이 기간에 피드백을 수집하고 모델을 개선합니다.
              - listitem [ref=e826]: Hy3 Preview Flash Free는 한정된 기간 동안 OpenCode에서 제공됩니다. 팀은 이 기간에 피드백을 수집하고 모델을 개선합니다.
              - listitem [ref=e827]: Nemotron 3 Super Free는 한정된 기간 동안 OpenCode에서 제공됩니다. 팀은 이 기간에 피드백을 수집하고 모델을 개선합니다.
              - listitem [ref=e828]: Big Pickle은 한정된 기간 동안 OpenCode에서 무료로 제공되는 stealth model입니다. 팀은 이 기간에 피드백을 수집하고 모델을 개선합니다.
            - paragraph [ref=e829]:
              - text: 궁금한 점이 있으면
              - link "Contact us" [ref=e830] [cursor=pointer]:
                - /url: mailto:contact@anoma.ly
              - text: 로 문의해 주세요.
            - separator [ref=e831]
            - heading "자동 충전" [level=3] [ref=e832]:
              - link "자동 충전" [ref=e833]:
                - /url: "#자동-충전"
            - paragraph [ref=e834]: 잔액이 $5 아래로 내려가면 Zen이 자동으로 $20을 충전합니다.
            - paragraph [ref=e835]: 자동 충전 금액은 변경할 수 있습니다. 자동 충전을 완전히 비활성화할 수도 있습니다.
            - separator [ref=e836]
            - heading "월간 한도" [level=3] [ref=e837]:
              - link "월간 한도" [ref=e838]:
                - /url: "#월간-한도"
            - paragraph [ref=e839]: 워크스페이스 전체와 팀의 각 구성원에 대해 월간 사용 한도를 설정할 수도 있습니다.
            - paragraph [ref=e840]: 예를 들어 월간 사용 한도를 $20로 설정하면, Zen은 한 달에 $20를 초과해 사용하지 않습니다. 하지만 자동 충전이 켜져 있다면 잔액이 $5 아래로 내려갈 때 자동으로 충전되어, 실제 청구 금액은 $20를 넘을 수 있습니다.
