      - main [ref=e160]:
        - generic [ref=e162]:
          - heading "Zen" [level=1] [ref=e163]
          - paragraph [ref=e164]: OpenCode가 제공하는 엄선된 모델 목록.
        - generic [ref=e166]:
          - generic [ref=e167]:
            - paragraph [ref=e168]: OpenCode Zen은 OpenCode 팀이 제공하는, 테스트와 검증을 거친 모델 목록입니다.
            - complementary "참고" [ref=e169]:
              - paragraph [ref=e170]:
                - img [ref=e171]
                - text: 참고
              - paragraph [ref=e174]: OpenCode Zen은 현재 beta입니다.
            - paragraph [ref=e175]:
              - text: Zen은 OpenCode의 다른 provider와 똑같이 작동합니다. OpenCode Zen에 로그인해 API 키를 받으면 됩니다. 이는
              - strong [ref=e176]: 완전히 선택 사항
              - text: 이며, OpenCode를 사용하기 위해 반드시 사용할 필요는 없습니다.
            - separator [ref=e177]
            - heading "배경" [level=2] [ref=e178]:
              - link "배경" [ref=e179]:
                - /url: "#배경"
            - paragraph [ref=e180]: 시중에는 매우 많은 모델이 있지만, 이 가운데 코딩 에이전트로 잘 작동하는 모델은 일부뿐입니다. 또한 대부분의 provider는 설정 방식이 매우 달라서, 성능과 품질에도 큰 차이가 생깁니다.
            - complementary "팁" [ref=e181]:
              - paragraph [ref=e182]:
                - img [ref=e183]
                - text: 팁
              - paragraph [ref=e187]: OpenCode에서 잘 작동하는 일부 모델과 provider를 직접 테스트했습니다.
            - paragraph [ref=e188]: 따라서 OpenRouter 같은 서비스를 통해 모델을 사용하면, 원하는 모델의 최적 버전을 정말 쓰고 있는지 확신하기 어렵습니다.
            - paragraph [ref=e189]: 이 문제를 해결하기 위해 다음과 같은 작업을 했습니다.
            - list [ref=e190]:
              - listitem [ref=e191]: 일부 모델을 직접 테스트하고, 각 팀과 함께 가장 잘 운영하는 방법을 논의했습니다.
              - listitem [ref=e192]: 이어서 몇몇 provider와 협력해, 이 모델들이 올바르게 제공되도록 했습니다.
              - listitem [ref=e193]: 마지막으로 모델/provider 조합을 벤치마크하고, 자신 있게 추천할 수 있는 목록을 정리했습니다.
            - paragraph [ref=e194]: OpenCode Zen은 이런 모델에 접근할 수 있게 해주는 AI gateway입니다.
            - separator [ref=e195]
            - heading "작동 방식" [level=2] [ref=e196]:
              - link "작동 방식" [ref=e197]:
                - /url: "#작동-방식"
            - paragraph [ref=e198]: OpenCode Zen은 OpenCode의 다른 provider와 똑같이 작동합니다.
            - list [ref=e199]:
              - listitem [ref=e200]:
                - text: "**"
                - link "OpenCode Zen" [ref=e201] [cursor=pointer]:
                  - /url: https://opencode.ai/auth
                - text: "**에 로그인하고, 결제 정보를 추가한 뒤, API 키를 복사합니다."
              - listitem [ref=e202]:
                - text: TUI에서
                - code [ref=e203]: "`/connect`"
                - text: 명령을 실행하고, OpenCode Zen을 선택한 다음 API 키를 붙여넣습니다.
              - listitem [ref=e204]:
                - text: TUI에서
                - code [ref=e205]: "`/models`"
                - text: 를 실행해, 저희가 추천하는 모델 목록을 확인합니다.
            - paragraph [ref=e206]: 요금은 요청별로 청구되며, 계정에 크레딧을 추가할 수 있습니다.
            - separator [ref=e207]
            - heading "엔드포인트" [level=2] [ref=e208]:
