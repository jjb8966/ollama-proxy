      - main [ref=e144]:
        - generic [ref=e146]:
          - heading "Go" [level=1] [ref=e147]
          - paragraph [ref=e148]: 오픈 코딩 모델을 위한 저비용 구독 서비스입니다.
        - generic [ref=e150]:
          - generic [ref=e151]:
            - paragraph [ref=e152]:
              - text: OpenCode Go는 인기 있는 오픈 코딩 모델에 안정적으로 액세스할 수 있게 해주는 저비용 구독 서비스입니다.
              - strong [ref=e153]: 첫 달은 $5
              - text: ", 이후에는"
              - strong [ref=e154]: 월 $10
              - text: 입니다.
            - complementary "참고" [ref=e155]:
              - paragraph [ref=e156]:
                - img [ref=e157]
                - text: 참고
              - paragraph [ref=e160]: OpenCode Go는 현재 베타입니다.
            - paragraph [ref=e161]:
              - text: Go는 OpenCode의 다른 제공자와 똑같이 작동합니다. OpenCode Go를 구독하고 API 키를 발급받으면 됩니다. 이는
              - strong [ref=e162]: 완전히 선택 사항
              - text: 이며, OpenCode를 사용하기 위해 꼭 필요하지는 않습니다.
            - paragraph [ref=e163]: 주로 해외 사용자를 위해 설계되었으며, 안정적인 전 세계 액세스를 위해 모델은 미국, EU, 싱가포르에 호스팅됩니다.
            - separator [ref=e164]
            - heading "배경" [level=2] [ref=e165]:
              - link "배경" [ref=e166]:
                - /url: "#배경"
            - paragraph [ref=e167]: 오픈 모델은 정말 많이 발전했습니다. 이제는 코딩 작업에서 독점 모델에 가까운 성능을 보여줍니다. 그리고 많은 제공자가 경쟁력 있게 서비스를 제공할 수 있기 때문에, 보통 훨씬 더 저렴합니다.
            - paragraph [ref=e168]: 하지만 이런 모델에 안정적이고 낮은 지연 시간으로 액세스하는 일은 쉽지 않을 수 있습니다. 제공자마다 품질과 가용성이 다르기 때문입니다.
            - complementary "팁" [ref=e169]:
              - paragraph [ref=e170]:
                - img [ref=e171]
                - text: 팁
              - paragraph [ref=e175]: OpenCode와 잘 맞는 선별된 모델과 제공자 그룹을 테스트했습니다.
            - paragraph [ref=e176]: 이를 해결하기 위해, 저희는 몇 가지를 진행했습니다.
            - list [ref=e177]:
              - listitem [ref=e178]: 선별된 오픈 모델 그룹을 테스트하고, 각 팀과 가장 잘 운영하는 방법에 대해 논의했습니다.
              - listitem [ref=e179]: 그런 다음 몇몇 제공자와 협력해, 이 모델들이 올바르게 서비스되도록 했습니다.
              - listitem [ref=e180]: 마지막으로 모델/제공자 조합을 벤치마킹해, 자신 있게 추천할 수 있는 목록을 만들었습니다.
            - paragraph [ref=e181]:
              - text: OpenCode Go를 사용하면
              - strong [ref=e182]: 첫 달은 $5
              - text: ", 이후에는"
              - strong [ref=e183]: 월 $10
              - text: 으로 이러한 모델에 액세스할 수 있습니다.
            - separator [ref=e184]
            - heading "작동 방식" [level=2] [ref=e185]:
              - link "작동 방식" [ref=e186]:
                - /url: "#작동-방식"
            - paragraph [ref=e187]: OpenCode Go는 OpenCode의 다른 제공자와 똑같이 작동합니다.
            - list [ref=e188]:
              - listitem [ref=e189]:
                - text: "**"
                - link "OpenCode Zen" [ref=e190] [cursor=pointer]:
                  - /url: https://opencode.ai/auth
                - text: "**에 로그인해 Go를 구독하고 API 키를 복사합니다."
              - listitem [ref=e191]:
                - text: TUI에서
                - code [ref=e192]: "`/connect`"
                - text: 명령을 실행하고
                - code [ref=e193]: "`OpenCode Go`"
                - text: 를 선택한 다음 API 키를 붙여넣습니다.
              - listitem [ref=e194]:
                - text: TUI에서
                - code [ref=e195]: "`/models`"
                - text: 를 실행해 Go를 통해 사용할 수 있는 모델 목록을 확인합니다.
            - complementary "참고" [ref=e196]:
