          - paragraph [ref=e290]: Built for complex software automation. Based on Kimi K2’s instruction following and logical reasoning capabilities, Kimi enables autonomous programming agents to handle debugging, refactoring, and multi-step development workflows with high precision.
        - generic [ref=e294]:
