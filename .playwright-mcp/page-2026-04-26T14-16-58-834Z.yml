          - paragraph [ref=e296]: Designed for long horizon, complex reasoning tasks. Leveraging the K2 Thinking model’s reasoning capability and up to 300-step tool calling, Kimi acts as an expert-level research assistant supporting strategic research, pricing and competitive analysis, stock and crypto investing analysis.
        - generic [ref=e300]:
          - heading "Legal Intelligence" [level=3] [ref=e301]
          - paragraph [ref=e302]: Streamline high-stakes document workflows. Kimi is optimized for rigorous attention to detail, making it ideal for legal and IP scenarios. From automated contract review to complex patent analysis and drafting, the model ensures strict adherence to terminology and logical structures.
        - generic [ref=e306]:
          - heading "Conversation Intelligence" [level=3] [ref=e307]
          - paragraph [ref=e308]: Extracting deep value from unstructured conversation data. Kimi excels in high fidelity conversation analysis, supporting use cases from psychological counseling quality assessment and public opinion monitoring to customer intent detection and key information extraction, including subtle linguistic signals.
